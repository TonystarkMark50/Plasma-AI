              - img [ref=e266]
            - region:
              - paragraph [ref=e268]: Nexus AI is SOC 2 Type II certified and fully GDPR compliant. All data is encrypted at rest using AES-256 and in transit using TLS 1.3. We offer dedicated infrastructure for enterprise customers with VPC peering and private networking options.
          - generic [ref=e269]:
            - button "Can I connect my existing databases and tools?" [ref=e270] [cursor=pointer]:
              - heading "Can I connect my existing databases and tools?" [level=3] [ref=e271]
              - img [ref=e273]
            - region:
              - paragraph [ref=e275]: Absolutely. Nexus AI features 200+ pre-built connectors for databases (PostgreSQL, MySQL, Snowflake, BigQuery), SaaS tools (Slack, Salesforce, HubSpot), and cloud services (AWS, GCP, Azure). Our universal API lets you connect anything custom.
          - generic [ref=e276]:
            - button "What happens if I exceed my monthly task limit?" [ref=e277] [cursor=pointer]:
              - heading "What happens if I exceed my monthly task limit?" [level=3] [ref=e278]
              - img [ref=e280]
            - region:
              - paragraph [ref=e282]: You will receive notifications at 80% and 100% of your task limit. Pro plans include auto-scaling with pay-as-you-go overage pricing. Enterprise plans include unlimited tasks with no overage charges.
