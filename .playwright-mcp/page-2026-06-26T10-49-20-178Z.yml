              - img [ref=e276]
            - region:
              - paragraph [ref=e278]: Nexus AI is SOC 2 Type II certified and fully GDPR compliant. All data is encrypted at rest using AES-256 and in transit using TLS 1.3. We offer dedicated infrastructure for enterprise customers with VPC peering and private networking options.
          - generic [ref=e279]:
            - button "Can I connect my existing databases and tools?" [ref=e280] [cursor=pointer]:
              - heading "Can I connect my existing databases and tools?" [level=3] [ref=e281]
              - img [ref=e282]
            - region:
              - paragraph [ref=e284]: Absolutely. Nexus AI features 200+ pre-built connectors for databases (PostgreSQL, MySQL, Snowflake, BigQuery), SaaS tools (Slack, Salesforce, HubSpot), and cloud services (AWS, GCP, Azure). Our universal API lets you connect anything custom.
          - generic [ref=e285]:
