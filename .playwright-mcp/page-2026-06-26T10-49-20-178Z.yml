              - heading "What happens if I exceed my monthly task limit?" [level=3] [ref=e287]
              - img [ref=e288]
            - region:
              - paragraph [ref=e290]: You will receive notifications at 80% and 100% of your task limit. Pro plans include auto-scaling with pay-as-you-go overage pricing. Enterprise plans include unlimited tasks with no overage charges.
